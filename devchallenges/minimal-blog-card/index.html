<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Blog Card</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div class="card">
      <div class="div-img">
        <img src="images/cactus.jpg" alt="A cactus" />
      </div>
      <div class="card-content">
        <div class="button">
          <h3>Design</h3>
        </div>
        <h2>Embracing Minimalism</h2>
        <p>
          From minimalist sculptures to minimalist paintings, this blog will
          inspire you to appreciate the beauty that lies in simplicity.
        </p>
        <div class="line"></div>
        <h6>Annie Spratt</h6>
      </div>
    </div>
  </body>
</html>
